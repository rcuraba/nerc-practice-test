let answers = JSON.parse(localStorage.getItem("nercAnswers") || "{}");

function renderQuiz(){
const quiz = document.getElementById("quiz");
quiz.innerHTML = "";

flashcards.forEach((q,i)=>{
let div = document.createElement("div");
div.classList.add("question-block");

let selected = answers[i];

div.innerHTML = `
<div class="question">
<strong>Question ${i+1}</strong><br><br>
${q.question}
</div>

${q.options.map(opt=>{
let letter = opt[0];
let isSelected = selected === letter ? "selected" : "";
return `<div class="option ${isSelected}" onclick="selectAnswer(${i},'${letter}',this)">
${opt}
</div>`;
}).join("")}
`;

quiz.appendChild(div);
});
}

function selectAnswer(i,letter,el){
answers[i]=letter;
localStorage.setItem("nercAnswers", JSON.stringify(answers));

let siblings = el.parentElement.querySelectorAll(".option");
siblings.forEach(s=>s.classList.remove("selected"));
el.classList.add("selected");
}

function submitTest(){
let correct=0;

flashcards.forEach((q,i)=>{
if(answers[i]===q.answer) correct++;
});

let percent=((correct/flashcards.length)*100).toFixed(2);

document.getElementById("result").innerText =
`Score: ${percent}% (${correct}/${flashcards.length})`;
}

function resetTest(){
if(confirm("Reset all answers?")){
localStorage.removeItem("nercAnswers");
location.reload();
}
}

renderQuiz();
